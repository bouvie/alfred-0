<header class="topbar" role="banner">
  <div class="topbar__start">
    <button class="topbar__menu-btn" aria-label="Menu" (click)="menuToggled.emit()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="5" x2="17" y2="5"/>
        <line x1="3" y1="10" x2="17" y2="10"/>
        <line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    @if (pageTitle()) {
      <h1 class="topbar__title">{{ pageTitle() }}</h1>
    }
  </div>

  <div class="topbar__end">
    <ng-content select="[topbar-actions]" />
    <ft-avatar [name]="userName()" size="sm" />
  </div>
</header>
